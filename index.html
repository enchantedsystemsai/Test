<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f1f5f9">
  <title>NoteCompass AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          animation: {
            'shimmer': 'shimmer 2s infinite',
          }
        }
      }
    }
  </script>




  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --app-bg: #fcfdfe;
      --app-accent: #0f172a;
      --safe-area-top: env(safe-area-inset-top, 0px);
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f1f5f9;
      margin: 0;
      padding: 0;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none; /* UI is non-selectable by default */
      transition: background-color 0.3s ease;
    }

    body.dragging {
      cursor: grabbing !important;
      user-select: none !important;
      -webkit-user-select: none !important;
    }

    body.dark {
      background-color: #020617;
    }

    /* Allow text selection in the actual content areas */
    main, .chat-content, textarea {
      user-select: text !important;
      -webkit-user-select: text !important;
    }

    .dragging main, .dragging textarea, .dragging input {
      user-select: none !important;
      -webkit-user-select: none !important;
      pointer-events: none !important;
    }

    /* Custom Scrollbar */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Glassmorphism utility */
    .glass {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
    }

    .dark .glass {
      background: rgba(15, 23, 42, 0.7);
    }

    /* Transitions & Animations */
    .page-transition-enter { transform: translateX(100%); }
    .page-transition-enter-active { transform: translateX(0); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    
    @keyframes spring-up {
      0% { transform: translateY(40px) scale(0.9); opacity: 0; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    .spring-up {
      animation: spring-up 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .pulse-soft {
      animation: pulse-soft 2s infinite ease-in-out;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Native Bottom Sheet feel */
    .bottom-sheet {
      border-radius: 40px 40px 0 0;
      box-shadow: 0 -20px 50px rgba(0,0,0,0.1);
    }

    input, textarea {
      font-family: inherit;
    }

    /* Prevent pulling to refresh on iOS */
    html, body {
      position: fixed;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="dark">
  <div id="root"></div>
  <script type="module" src="index.tsx"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
